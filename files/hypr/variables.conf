# ═══════════════════════════════════════════════════════
# Variables — Tunable settings referenced throughout
# ═══════════════════════════════════════════════════════

# Apps
$terminal = alacritty
$browser = firefox
$editor = emacsclient -cn
$fileExplorer = nautilus

# Touchpad
$touchpadDisableTyping = true
$touchpadScrollFactor = 0.3

# Blur
$blurEnabled = true
$blurSpecialWs = false
$blurPopups = true
$blurInputMethods = true
$blurSize = 8
$blurPasses = 2
$blurXray = false

# Shadow
$shadowEnabled = true
$shadowRange = 20
$shadowRenderPower = 3
$shadowColour = rgba(1a1a1ad4)

# Gaps
$workspaceGaps = 20
$windowGapsIn = 3
$windowGapsOut = 9
$singleWindowGapsOut = 0

# Window styling
$windowOpacity = 0.95
$windowRounding = 20

$windowBorderSize = 3
$activeWindowBorderColour = rgba(89b4fae6)
$inactiveWindowBorderColour = rgba(585b70aa)

# Misc
$volumeStep = 5
$cursorTheme = Adwaita
$cursorSize = 24
