# ═══════════════════════════════════════════════════════
# Hyprland Main Config — Edict
# ═══════════════════════════════════════════════════════
# Modular config structure adapted from nehrbash/caelestia.
# Each section is split into a separate file for clarity.

$hypr = ~/.config/hypr
$hl = $hypr/hyprland

# Variables (apps, blur, gaps, colors, etc.)
source = $hypr/variables.conf

# Default monitor — safe fallback for any display
monitor = , preferred, auto, 1

# Sub-configs
source = $hl/general.conf
source = $hl/input.conf
source = $hl/misc.conf
source = $hl/animations.conf
source = $hl/decoration.conf
source = $hl/group.conf
source = $hl/execs.conf
source = $hl/rules.conf
source = $hl/gestures.conf
source = $hl/keybinds.conf
